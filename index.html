<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karina 心理測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-pink-400">
        <h1 class="text-3xl font-bold text-pink-600 mb-6">💖 戀愛求生欲測試 💖</h1>
        <p class="text-gray-600 mb-8 italic">「你真的懂她在想什麼嗎？」</p>
        
        <form method="POST" class="space-y-6 text-left">
            <div>
                <label class="block text-sm font-semibold text-gray-700">她的全名 (例如：劉知珉)</label>
                <input type="text" name="name_all" placeholder="預設：劉知珉" class="w-full mt-2 p-3 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-400 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">妳平時對她的暱稱 (例如：Karina)</label>
                <input type="text" name="name" placeholder="預設：Karina" class="w-full mt-2 p-3 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-400 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-xl shadow-lg transition duration-300 transform hover:scale-105">
                進入測驗
            </button>
        </form>
    </div>
</body>
</html>
