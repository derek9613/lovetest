<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗結果 - 戀愛求生欲測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-lg w-full text-center border-b-8 border-pink-400">
        <!-- 慶祝圖示 -->
        <div class="text-7xl mb-6">🎉</div>
        
        <h1 class="text-3xl font-black text-gray-800 mb-2">測驗完成！</h1>
        <p class="text-gray-400 mb-8">感謝你的參與，結果出爐囉：</p>
        
        <!-- 分數顯示區域 -->
        <div class="my-10">
            <p class="text-pink-400 font-bold uppercase tracking-widest text-sm">最終求生欲得分</p>
            <div class="text-9xl font-black text-pink-500 mt-2 drop-shadow-md">{{ score }}</div>
        </div>

        <!-- 評語區塊 -->
        <div class="bg-pink-50 p-6 rounded-2xl mb-10 border border-pink-100 text-left">
            <h2 class="text-2xl font-bold text-pink-700 mb-3 border-b-2 border-pink-200 pb-2 inline-block">
                {{ short }}
            </h2>
            <p class="text-gray-600 leading-relaxed mt-2 text-lg">
                {{ long }}
            </p>
        </div>

        <!-- 功能按鈕 -->
        <div class="space-y-4">
            <a href="/" class="block w-full bg-pink-500 hover:bg-pink-600 text-white font-black py-4 rounded-2xl shadow-xl transition transform hover:scale-[1.03] text-xl">
                重新測試一次
            </a>
            
            <p class="text-xs text-gray-300">
                記住：分數只是參考，真心誠意才是王道 💖
            </p>
        </div>
    </div>
</body>
</html>
