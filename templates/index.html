<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戀愛求生欲測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-pink-400">
        <h1 class="text-4xl font-black text-pink-600 mb-4">💘 戀愛測驗</h1>
        <p class="text-gray-500 mb-8 italic">「在測驗開始前，請先告訴我她是誰？」</p>
        
        <form method="POST" class="space-y-6 text-left">
            <div>
                <label class="block text-sm font-bold text-gray-700 font-sans">她的全名 (例如：劉知珉)</label>
                <input type="text" name="name_all" placeholder="預設：劉知珉" required class="w-full mt-2 p-3 border-2 border-pink-100 rounded-xl focus:border-pink-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 font-sans">你平時對她的暱稱 (例如：Karina)</label>
                <input type="text" name="name" placeholder="預設：Karina" required class="w-full mt-2 p-3 border-2 border-pink-100 rounded-xl focus:border-pink-500 outline-none transition">
            </div>
            
            <button type="submit" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-black py-4 rounded-2xl shadow-lg transition transform hover:scale-105">
                開始測驗
            </button>
        </form>
        
        <p class="mt-6 text-xs text-gray-400 font-sans text-center">※ 測驗結果僅供參考，求生要緊。</p>
    </div>
</body>
</html>
